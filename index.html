<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadar Anna | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1b1c17; 
            --text-color: #e0d8c3; 
            --accent-color: #a67c52; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .subtitle {
            font-style: italic;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            text-decoration: none;
            color: inherit;
            display: block;
            text-align: center;
        }

        .image-container {
            position: relative;
            overflow: hidden;
            aspect-ratio: 4 / 5;
            border: 1px solid rgba(166, 124, 82, 0.2);
            margin-bottom: 15px;
            transition: all 0.4s ease;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s ease;
        }

        .view-more {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            opacity: 0.8;
            transition: 0.3s;
        }

        .gallery-item:hover .image-container {
            border-color: var(--accent-color);
            transform: translateY(-5px);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .gallery-item:hover .view-more {
            opacity: 1;
            letter-spacing: 3px;
        }

        footer {
            text-align: center;
            padding: 100px 20px;
        }

        .btn-contact {
            display: inline-block;
            padding: 18px 40px;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
        }

        .btn-contact:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .copyright {
            margin-top: 50px;
            font-size: 0.75rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<header>
